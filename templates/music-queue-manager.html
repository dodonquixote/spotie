<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotie — Tambah ke Antrian</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: rgba(255,255,255,0.07);
      --accent: #1db954;
      --accent-dim: rgba(29,185,84,0.15);
      --accent-glow: rgba(29,185,84,0.35);
      --text: #f0f0f5;
      --muted: #6b6b80;
      --subtle: #2a2a38;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── Background glow blobs ── */
    .blobs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: #1db954; top: -150px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: #0d6b3a; bottom: -100px; right: -80px; animation-delay: -8s; }
    .blob-3 { width: 250px; height: 250px; background: #1db954; top: 50%; left: 50%; animation-delay: -14s; opacity: 0.08; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 28px 40px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(10,10,15,0.6);
      position: sticky; top: 0; z-index: 10;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem;
      letter-spacing: -0.02em;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .logo-icon svg { width: 18px; height: 18px; fill: #000; }
    .host-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 100px;
      background: var(--accent-dim);
      border: 1px solid rgba(29,185,84,0.3);
      font-size: 0.8rem; font-weight: 500; color: var(--accent);
      text-decoration: none;
    }
    .host-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    /* ── Main ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 40px 60px;
    }

    /* ── Now Playing ── */
    .now-playing-section { display: flex; flex-direction: column; gap: 28px; min-width: 0; }

    .section-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }

    .now-playing-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      display: flex; gap: 24px; align-items: center;
      position: relative; overflow: hidden;
      transition: border-color 0.3s;
      width: 100%; min-width: 0;
    }
    .now-playing-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-dim) 0%, transparent 60%);
      pointer-events: none;
    }
    .album-art {
      width: 100px; height: 100px; border-radius: 12px;
      background: linear-gradient(135deg, #1a3a25, #0d1f15);
      flex-shrink: 0; position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .album-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .album-art-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title-wrap {
      overflow: hidden;
      margin-bottom: 4px;
      min-width: 0;
    }
    .song-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.3rem;
      letter-spacing: -0.02em;
      white-space: nowrap;
      display: inline-block;
    }
    .song-title.scrolling {
      animation: marquee-scroll var(--scroll-dur, 8s) linear infinite;
      padding-right: 60px;
    }
    @keyframes marquee-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(var(--scroll-dist, -100%)); }
    }
    .song-artist-wrap {
      overflow: hidden;
      margin-bottom: 16px;
      min-width: 0;
    }
    .song-artist {
      color: var(--muted); font-size: 0.9rem;
      white-space: nowrap;
      display: inline-block;
    }
    .song-artist.scrolling {
      animation: marquee-scroll var(--scroll-dur-a, 10s) linear infinite;
      padding-right: 60px;
    }
    .progress-bar-wrap { position: relative; }
    .progress-bar {
      height: 3px; background: var(--subtle);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 38%;
      background: linear-gradient(90deg, var(--accent), #52e88a);
      border-radius: 2px;
      animation: progress 120s linear infinite;
    }
    @keyframes progress { from{width:38%} to{width:100%} }
    .progress-times {
      display: flex; justify-content: space-between;
      font-size: 0.72rem; color: var(--muted); margin-top: 6px;
    }
    .playing-indicator {
      display: flex; align-items: flex-end; gap: 3px; height: 20px;
    }
    .bar { width: 3px; background: var(--accent); border-radius: 2px; animation: bounce var(--d) ease-in-out infinite alternate; }
    .bar:nth-child(1){height:8px; --d:0.6s}
    .bar:nth-child(2){height:14px;--d:0.4s}
    .bar:nth-child(3){height:10px;--d:0.7s}
    .bar:nth-child(4){height:18px;--d:0.5s}
    .bar:nth-child(5){height:6px; --d:0.45s}
    @keyframes bounce { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }

    /* ── Search ── */
    .search-section { display: flex; flex-direction: column; gap: 16px; }
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 14px 20px 14px 48px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus {
      border-color: rgba(29,185,84,0.5);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-icon svg { width: 18px; height: 18px; }

    /* ── Search Results ── */
    .results-list { display: flex; flex-direction: column; gap: 4px; }
    .result-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px; border-radius: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .result-item:hover {
      background: var(--card);
      border-color: var(--border);
      transform: translateX(4px);
    }
    .result-thumb {
      width: 46px; height: 46px; border-radius: 8px;
      background: var(--subtle); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; overflow: hidden;
    }
    .result-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .result-info { flex: 1; min-width: 0; }
    .result-name { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-duration { font-size: 0.78rem; color: var(--muted); flex-shrink: 0; }
    .add-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }
    .add-btn:hover {
      background: var(--accent); color: #000;
      border-color: var(--accent);
      transform: scale(1.1);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .add-btn svg { width: 16px; height: 16px; }
    .add-btn.added { background: var(--accent-dim); color: var(--accent); border-color: rgba(29,185,84,0.4); }

    /* ── Sidebar: Queue ── */
    .queue-section {
      display: flex; flex-direction: column; gap: 20px;
      position: sticky; top: 100px; align-self: start;
      min-width: 0;
    }
    .queue-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .queue-count {
      font-size: 0.78rem; padding: 3px 10px;
      background: var(--subtle); border-radius: 100px;
      color: var(--muted);
    }
    .queue-list {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
      max-height: calc(100vh - 280px); overflow-y: auto;
    }
    .queue-list::-webkit-scrollbar { width: 4px; }
    .queue-list::-webkit-scrollbar-track { background: transparent; }
    .queue-list::-webkit-scrollbar-thumb { background: var(--subtle); border-radius: 2px; }

    .queue-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .queue-item:last-child { border-bottom: none; }
    .queue-item:hover { background: rgba(255,255,255,0.03); }
    .queue-num {
      font-size: 0.72rem; color: var(--muted);
      width: 16px; text-align: center; flex-shrink: 0;
    }
    .queue-thumb {
      width: 38px; height: 38px; border-radius: 6px;
      background: var(--subtle); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; overflow: hidden;
    }
    .queue-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .queue-info { flex: 1; min-width: 0; }
    .queue-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .queue-artist { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
    .queue-added-by {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 100px;
      background: var(--accent-dim); color: var(--accent);
      flex-shrink: 0; white-space: nowrap;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 32px; right: 32px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 100;
    }
    .toast {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: var(--card);
      border: 1px solid rgba(29,185,84,0.4);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px var(--accent-dim);
      font-size: 0.88rem;
      animation: slideIn 0.3s ease, fadeOut 0.4s ease 2.6s forwards;
      max-width: 340px;
    }
    .toast-icon { color: var(--accent); flex-shrink: 0; }
    .toast-icon svg { width: 18px; height: 18px; }
    @keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(10px)} }

    /* ── Empty state ── */
    .empty-state {
      padding: 48px 20px; text-align: center;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 0.85rem; }

    /* ── Mobile Tabs ── */
    .mobile-tabs { display: none; }
    .mobile-tab {
      flex: 1; padding: 11px 0;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.83rem; font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .mobile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .mobile-tab-badge {
      background: var(--accent); color: #000;
      font-size: 0.62rem; font-weight: 700;
      min-width: 17px; height: 17px; border-radius: 9px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      header { padding: 16px 20px; }

      .mobile-tabs {
        display: flex;
        position: sticky; top: 65px; z-index: 9;
        background: rgba(10,10,15,0.93);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 0 20px;
      }

      main {
        grid-template-columns: 1fr;
        padding: 24px 20px 60px;
        gap: 28px;
      }

      .queue-section { position: static; display: none; }
      .queue-section.mobile-active { display: flex; }
      .now-playing-section.mobile-hidden { display: none; }

      .queue-list { max-height: none; }
      .add-btn { width: 38px; height: 38px; }
      .result-item { padding: 13px 14px; }
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }

      .mobile-tabs { top: 53px; padding: 0 16px; }

      .logo { font-size: 1.05rem; gap: 8px; }
      .logo-icon { width: 28px; height: 28px; border-radius: 7px; }
      .logo-icon svg { width: 15px; height: 15px; }
      .host-badge { padding: 5px 11px; font-size: 0.75rem; }

      main { padding: 18px 16px 60px; gap: 22px; }

      .now-playing-card { padding: 16px 14px; gap: 14px; border-radius: 16px; }
      .album-art { width: 76px; height: 76px; border-radius: 10px; }
      .song-title { font-size: 1.05rem; }
    .song-artist { margin-bottom: 0; }
      .song-artist-wrap { margin-bottom: 10px; }
      .progress-bar { height: 4px; }

      .search-input {
        padding: 13px 16px 13px 42px;
        font-size: 0.9rem;
        border-radius: 12px;
      }
      .search-icon { left: 13px; }
      .search-icon svg { width: 16px; height: 16px; }

      .result-item { padding: 11px 12px; gap: 11px; border-radius: 10px; }
      .result-thumb { width: 40px; height: 40px; border-radius: 7px; }
      .result-name { font-size: 0.87rem; }
      .result-meta { font-size: 0.73rem; }
      .result-duration { font-size: 0.73rem; }
      .add-btn { width: 36px; height: 36px; }
      .add-btn svg { width: 15px; height: 15px; }

      .queue-item { padding: 11px 14px; gap: 10px; }
      .queue-thumb { width: 34px; height: 34px; border-radius: 5px; }
      .queue-name { font-size: 0.82rem; }
      .queue-artist { font-size: 0.72rem; }
      .queue-list { border-radius: 14px; }

      .toast-container { bottom: 20px; right: 16px; left: 16px; }
      .toast { max-width: 100%; border-radius: 12px; padding: 12px 16px; }

      .section-label { font-size: 0.65rem; }
      .empty-state { padding: 36px 16px; }
    }
  </style>
</head>
<body>
  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page">
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.65 14.44c-.2.32-.62.42-.94.22-2.58-1.58-5.83-1.93-9.65-1.06-.37.08-.73-.15-.81-.52-.08-.37.15-.73.52-.81 4.19-.96 7.78-.55 10.67 1.23.32.2.42.62.21.94zm1.24-2.76c-.25.4-.78.52-1.18.27-2.95-1.81-7.44-2.34-10.93-1.28-.45.14-.93-.12-1.07-.57-.14-.45.12-.93.57-1.07 3.99-1.21 8.95-.62 12.34 1.47.4.25.52.78.27 1.18zm.11-2.87C14.4 8.87 8.77 8.67 5.32 9.73c-.54.17-1.11-.14-1.27-.68-.17-.54.14-1.11.68-1.27 3.98-1.21 10.6-.98 14.78 1.49.49.29.65.92.36 1.41-.29.49-.92.65-1.41.36z"/></svg>
        </div>
        Spotie
      </div>
      <a class="host-badge" href="https://open.spotify.com/user/3162hglvh32bgbrmpvhyw3mblvdi?si=2d41b9b1957946a4" target="_blank" rel="noopener noreferrer">
        <span class="dot"></span>
        <span>@dodoon</span>
      </a>
    </header>

    <!-- Mobile Tab Bar -->
    <div class="mobile-tabs">
      <button class="mobile-tab active" data-tab="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Cari Lagu
      </button>
      <button class="mobile-tab" data-tab="queue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Antrian
        <span class="mobile-tab-badge" id="mobileQueueBadge" style="display:none">0</span>
      </button>
    </div>

    <!-- Main -->
    <main>
      <!-- Left Column -->
      <div class="now-playing-section">

        <!-- Now Playing -->
        <div>
          <div class="section-label" style="margin-bottom:14px">▶ Sedang Diputar</div>
          <div class="now-playing-card" id="nowPlayingCard">
            <div class="album-art" id="nowAlbumArt">
              <div class="album-art-placeholder">🎵</div>
            </div>
            <div class="song-info">
              <div class="song-title-wrap"><div class="song-title" id="nowTitle">—</div></div>
              <div class="song-artist-wrap"><div class="song-artist" id="nowArtist">Belum ada lagu yang diputar</div></div>
              <div class="progress-bar-wrap">
                <div class="progress-bar"><div class="progress-fill" id="nowProgressFill" style="width:0%;animation:none"></div></div>
                <div class="progress-times"><span id="nowProgress">0:00</span><span id="nowDuration">0:00</span></div>
              </div>
            </div>
            <div class="playing-indicator" id="nowIndicator" style="display:none">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div>
            </div>
          </div>
          <!-- Login Button -->
          <div id="loginBanner" style="display:none"></div>
        </div>

        <!-- Search -->
        <div class="search-section">
          <div class="section-label">Tambah Lagu ke Antrian</div>
          <div class="search-wrap">
            <div class="search-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </div>
            <input class="search-input" type="text" id="searchInput" placeholder="Cari judul lagu, artis, atau album…" autocomplete="off" />
          </div>

          <div class="results-list" id="resultsList"></div>
        </div>

      </div>

      <!-- Right Sidebar: Queue -->
      <div class="queue-section">
        <div class="queue-header">
          <div class="section-label">Antrian Lagu</div>
          <div class="queue-count" id="queueCount">0 lagu</div>
        </div>
        <div class="queue-list" id="queueList">
          <div class="empty-state">
            <div class="icon">🎧</div>
            <p>Belum ada lagu di antrian.<br/>Cari dan tambahkan lagu di atas!</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

<script>
  // ── State ──
  const queue = [];
  const addedIds = new Set();
  let searchTimeout = null;
  let lastSearchResults = [];

  const searchInput   = document.getElementById('searchInput');
  const resultsList   = document.getElementById('resultsList');
  const queueList     = document.getElementById('queueList');
  const queueCount    = document.getElementById('queueCount');
  const toastContainer= document.getElementById('toastContainer');

  // ── Search Spotify via backend API ──
  async function searchSpotify(query) {
    if (!query.trim()) {
      resultsList.innerHTML = '';
      lastSearchResults = [];
      return;
    }
    
    // Show loading state
    resultsList.innerHTML = `<div class="empty-state" style="padding:32px"><div class="icon">⏳</div><p>Mencari...</p></div>`;
    
    try {
      const response = await fetch(`/api/search?q=${encodeURIComponent(query)}&limit=7`);
      const data = await response.json();
      
      if (data.error) {
        resultsList.innerHTML = `<div class="empty-state" style="padding:32px"><div class="icon">⚠️</div><p>${data.error}</p></div>`;
        return;
      }
      
      lastSearchResults = data.tracks || [];
      renderResults(lastSearchResults);
    } catch (error) {
      console.error('Search error:', error);
      resultsList.innerHTML = `<div class="empty-state" style="padding:32px"><div class="icon">❌</div><p>Gagal mencari lagu</p></div>`;
    }
  }

  // ── Render search results ──
  function renderResults(tracks) {
    if (!tracks.length) {
      resultsList.innerHTML = `<div class="empty-state" style="padding:32px"><div class="icon">🔍</div><p>Lagu tidak ditemukan</p></div>`;
      return;
    }

    resultsList.innerHTML = tracks.map(s => `
      <div class="result-item" data-id="${s.id}" data-spotify-url="${s.spotify_url}">
        <div class="result-thumb">
          ${s.image_url ? `<img src="${s.image_url}" alt="${s.title}">` : '🎵'}
        </div>
        <div class="result-info">
          <div class="result-name">${s.title}</div>
          <div class="result-meta">${s.artist} · ${s.album}</div>
        </div>
        <div class="result-duration">${s.duration}</div>
        <button class="add-btn ${addedIds.has(s.id)?'added':''}" data-id="${s.id}" data-spotify-url="${s.spotify_url}" title="Tambah ke antrian">
          ${addedIds.has(s.id)
            ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`
          }
        </button>
      </div>
    `).join('');
  }

  // ── Add to queue via n8n webhook ──
  async function addToQueue(songId, spotifyUrl) {
    if (addedIds.has(songId)) return;
    
    const song = lastSearchResults.find(s => s.id === songId);
    if (!song) return;
    
    // Mark as added immediately for UI feedback
    addedIds.add(songId);
    renderResults(lastSearchResults);
    
    try {
      const response = await fetch('/api/queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ spotify_link: spotifyUrl })
      });
      
      const data = await response.json();
      
      if (data.success) {
        queue.push({ ...song, addedBy: 'Tamu' });
        renderQueue();
        showToast(song, true);
      } else {
        // Revert if failed
        addedIds.delete(songId);
        renderResults(lastSearchResults);
        showToast(song, false, data.error || 'Gagal menambahkan');
      }
    } catch (error) {
      console.error('Add to queue error:', error);
      addedIds.delete(songId);
      renderResults(lastSearchResults);
      showToast(song, false, 'Koneksi gagal');
    }
  }

  // ── Render queue ──
  function renderQueue() {
    queueCount.textContent = `${queue.length} lagu`;
    // Update mobile badge
    const badge = document.getElementById('mobileQueueBadge');
    if (badge) {
      if (queue.length > 0) { badge.textContent = queue.length; badge.style.display = 'inline-flex'; }
      else { badge.style.display = 'none'; }
    }
    if (!queue.length) {
      queueList.innerHTML = `<div class="empty-state"><div class="icon">🎧</div><p>Belum ada lagu di antrian.<br/>Cari dan tambahkan lagu di atas!</p></div>`;
      return;
    }
    queueList.innerHTML = queue.map((s, i) => `
      <div class="queue-item">
        <div class="queue-num">${i + 1}</div>
        <div class="queue-thumb">
          ${s.image_url ? `<img src="${s.image_url}" alt="${s.title}">` : '🎵'}
        </div>
        <div class="queue-info">
          <div class="queue-name">${s.title}</div>
          <div class="queue-artist">${s.artist}</div>
        </div>
        <div class="queue-added-by">@${s.addedBy}</div>
      </div>
    `).join('');
  }

  // ── Toast ──
  function showToast(song, success = true, errorMsg = '') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    if (success) {
      toast.innerHTML = `
        <div class="toast-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <strong>${song.title}</strong> ditambahkan ke antrian!<br/>
          <span style="color:var(--muted);font-size:0.8rem">${song.artist}</span>
        </div>
      `;
    } else {
      toast.innerHTML = `
        <div class="toast-icon" style="color:#ff4444">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <div>
          <strong>Gagal menambahkan</strong> ${song.title}<br/>
          <span style="color:var(--muted);font-size:0.8rem">${errorMsg}</span>
        </div>
      `;
    }
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ── Events ──
  searchInput.addEventListener('input', e => {
    // Debounce search to avoid too many API calls
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchSpotify(e.target.value);
    }, 300);
  });

  resultsList.addEventListener('click', e => {
    const btn = e.target.closest('.add-btn');
    if (btn) {
      const songId = btn.dataset.id;
      const spotifyUrl = btn.dataset.spotifyUrl;
      addToQueue(songId, spotifyUrl);
      return;
    }
    const item = e.target.closest('.result-item');
    if (item) {
      const songId = item.dataset.id;
      const spotifyUrl = item.dataset.spotifyUrl;
      addToQueue(songId, spotifyUrl);
    }
  });

  // ── Now Playing ──
  let nowPlayingInterval = null;
  let localProgressMs = 0;
  let localProgressInterval = null;
  let isPlaying = false;

  async function fetchNowPlaying() {
    try {
      const response = await fetch('/api/now-playing');
      if (response.status === 401) {
        document.getElementById('loginBanner').style.display = 'block';
        document.getElementById('nowTitle').textContent = 'Perlu login Spotify';
      document.getElementById('nowArtist').textContent = 'Klik tombol di bawah untuk login';
        document.getElementById('nowArtist').classList.remove('scrolling');
        return;
      }
      document.getElementById('loginBanner').style.display = 'none';
      const data = await response.json();
      if (!data.is_playing || !data.title) {
        document.getElementById('nowTitle').textContent = '—';
        document.getElementById('nowArtist').textContent = 'Tidak ada lagu yang diputar';
        document.getElementById('nowArtist').classList.remove('scrolling');
        document.getElementById('nowTitle').classList.remove('scrolling');
        document.getElementById('nowProgressFill').style.width = '0%';
        document.getElementById('nowProgress').textContent = '0:00';
        document.getElementById('nowDuration').textContent = '0:00';
        document.getElementById('nowIndicator').style.display = 'none';
        document.getElementById('nowAlbumArt').innerHTML = '<div class="album-art-placeholder">🎵</div>';
        stopLocalProgress();
        return;
      }
      // Update UI
      const titleEl = document.getElementById('nowTitle');
      titleEl.classList.remove('scrolling');
      titleEl.style.removeProperty('--scroll-dur');
      titleEl.style.removeProperty('--scroll-dist');
      titleEl.textContent = data.title;

      const artistEl = document.getElementById('nowArtist');
      artistEl.classList.remove('scrolling');
      artistEl.style.removeProperty('--scroll-dur-a');
      artistEl.style.removeProperty('--scroll-dist-a');
      const artistText = `${data.artist} · ${data.album}`;
      artistEl.textContent = artistText;

      // Trigger marquee if text overflows its container
      setTimeout(() => {
        const wrapT = titleEl.parentElement;
        const overflowT = titleEl.scrollWidth - wrapT.clientWidth;
        if (overflowT > 2) {
          const dur = Math.max(4, overflowT / 40);
          titleEl.style.setProperty('--scroll-dur', dur + 's');
          titleEl.style.setProperty('--scroll-dist', '-' + (titleEl.scrollWidth + 30) + 'px');
          titleEl.classList.add('scrolling');
        }
        const wrapA = artistEl.parentElement;
        const overflowA = artistEl.scrollWidth - wrapA.clientWidth;
        if (overflowA > 2) {
          const durA = Math.max(5, overflowA / 35);
          artistEl.style.setProperty('--scroll-dur-a', durA + 's');
          artistEl.style.setProperty('--scroll-dist', '-' + (artistEl.scrollWidth + 30) + 'px');
          artistEl.classList.add('scrolling');
        }
      }, 150);
      document.getElementById('nowDuration').textContent = data.duration_str;
      document.getElementById('nowIndicator').style.display = data.is_playing ? 'flex' : 'none';
      // Album art
      const artEl = document.getElementById('nowAlbumArt');
      artEl.innerHTML = data.image_url
        ? `<img src="${data.image_url}" alt="${data.title}">`
        : '<div class="album-art-placeholder">🎵</div>';
      // Sync local progress
      localProgressMs = data.progress_ms;
      isPlaying = data.is_playing;
      updateProgressUI(data.progress_ms, data.duration_ms);
      startLocalProgress(data.duration_ms);
    } catch (e) {
      console.error('Now playing error:', e);
    }
  }

  function updateProgressUI(progressMs, durationMs) {
    if (!durationMs) return;
    const pct = Math.min((progressMs / durationMs) * 100, 100);
    document.getElementById('nowProgressFill').style.width = pct + '%';
    const pm = Math.floor(progressMs / 60000);
    const ps = Math.floor((progressMs % 60000) / 1000);
    document.getElementById('nowProgress').textContent = `${pm}:${ps.toString().padStart(2,'0')}`;
  }

  function startLocalProgress(durationMs) {
    stopLocalProgress();
    if (!isPlaying) return;
    localProgressInterval = setInterval(() => {
      localProgressMs += 1000;
      if (localProgressMs > durationMs) localProgressMs = durationMs;
      updateProgressUI(localProgressMs, durationMs);
    }, 1000);
  }

  function stopLocalProgress() {
    if (localProgressInterval) {
      clearInterval(localProgressInterval);
      localProgressInterval = null;
    }
  }

  // Poll every 8 seconds
  fetchNowPlaying();
  nowPlayingInterval = setInterval(fetchNowPlaying, 8000);

  // ── Mobile Tabs ──
  const mobileTabBtns = document.querySelectorAll('.mobile-tab');
  const nowPlayingSection = document.querySelector('.now-playing-section');
  const queueSectionEl   = document.querySelector('.queue-section');

  mobileTabBtns.forEach(tab => {
    tab.addEventListener('click', () => {
      mobileTabBtns.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (tab.dataset.tab === 'search') {
        nowPlayingSection.classList.remove('mobile-hidden');
        queueSectionEl.classList.remove('mobile-active');
      } else {
        nowPlayingSection.classList.add('mobile-hidden');
        queueSectionEl.classList.add('mobile-active');
      }
    });
  });

  // ── Init ──
  renderQueue();
</script>
</body>
</html>
